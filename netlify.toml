# Single static site: main menu at / + games under /ndfa, /ronit, /cbt, /math-english
# Backend (Python + Postgres) is NOT on Netlify — host it elsewhere and point the frontends at it.

[build]
  command = "npm run build"
  publish = "publish"

[build.environment]
  NODE_VERSION = "20"

# Optional — code defaults match monorepo deploy (Render + paths /ndfa/, /ronit/, /cbt/, /math-english/).
# Set only if your backend URL is NOT the one hardcoded in the apps (see RENDER_BACKEND in App.jsx).
#
#   Key                  Value example
#   VITE_BACKEND_URL     https://ndfa-memory-match-game.onrender.com
#
# You do NOT need VITE_NDFA_GAME_URL, VITE_RONIT_GAME_URL, VITE_CBT_GAME_URL, VITE_MATH_ENGLISH_GAME_URL
# unless you want to override the built-in path defaults.

# Optional: proxy /api and /socket.io through Netlify to the backend (same origin).
# WebSockets via Netlify proxy can be unreliable — prefer VITE_BACKEND_URL pointing straight to the API
# for socket.io in production.
#
# [[redirects]]
#   from = "/api/*"
#   to = "https://YOUR-BACKEND.example.com/api/:splat"
#   status = 200
#   force = true
#
# [[redirects]]
#   from = "/socket.io/*"
#   to = "https://YOUR-BACKEND.example.com/socket.io/:splat"
#   status = 200
#   force = true
